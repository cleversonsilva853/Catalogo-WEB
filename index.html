<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Delivery Grill</title>
    <meta name="description" content="Faça seu pedido online de forma rápida e fácil.">
    <meta name="author" content="Cardápio Digital" />
    <meta name="theme-color" content="#f59e0b" />
    <!-- PWA Global Catcher -->
    <script>
      window.deferredPWAInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAInstallPrompt = e;
      });
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cardápio" />

    <!-- Open Graph -->
    
    
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  <!-- Imagem Padrão Redes Sociais. Recomenda-se colocar a URL absoluta do seu domínio (ex: https://meusite.com/icon-512.png) pelo fato do WhatsApp exigir URL absoluta -->
  <meta property="og:image" content="/icon-512.png">
  <meta name="twitter:image" content="/icon-512.png">
  
  
  
  
  <meta property="og:title" content="Delivery Grill">
  <meta name="twitter:title" content="Delivery Grill">
  <meta property="og:description" content="Faça seu pedido online de forma rápida e fácil.">
  <meta name="twitter:description" content="Faça seu pedido online de forma rápida e fácil.">
</head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
